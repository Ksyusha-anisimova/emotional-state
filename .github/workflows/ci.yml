name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: test (lint + static + unit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run lint, complexity and coverage
        run: npm run ci:test

      - name: Upload test-stage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-stage-artifacts
          path: |
            coverage/**
            artifacts/static-analysis/**
          if-no-files-found: error

  integration:
    name: integration (BDD)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run integration tests
        run: npm run ci:integration

      - name: Upload integration artifacts
        uses: actions/upload-artifact@v4
        with:
          name: integration-stage-artifacts
          path: |
            artifacts/reports/**
            test-results/**
          if-no-files-found: warn

  report:
    name: report (artifacts + quality)
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download test-stage artifacts
        uses: actions/download-artifact@v4
        with:
          name: test-stage-artifacts
          path: ci-artifacts/test

      - name: Download integration-stage artifacts
        uses: actions/download-artifact@v4
        with:
          name: integration-stage-artifacts
          path: ci-artifacts/integration

      - name: Upload consolidated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ci-consolidated-artifacts
          path: ci-artifacts/**
          if-no-files-found: error

      - name: SonarCloud scan (if configured)
        if: ${{ secrets.SONAR_TOKEN != '' && vars.SONAR_PROJECT_KEY != '' && vars.SONAR_ORGANIZATION != '' }}
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.host.url=https://sonarcloud.io
